<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Weather Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <h1>Weather Dashboard</h1>

    <section class="controls">
      <input id="cityInput" type="text" placeholder="Enter city (e.g. London)" />
      <button id="searchBtn">Search</button>
      <button id="geoBtn">Use my location</button>
    </section>

    <section id="current" class="card hidden">
      <h2 id="cityName"></h2>
      <div class="current-row">
        <img id="weatherIcon" alt="weather icon" />
        <div>
          <div id="temp" class="temp"></div>
          <div id="desc" class="desc"></div>
          <div id="details" class="details"></div>
        </div>
      </div>
    </section>

    <section id="forecast" class="card hidden">
      <h3>Forecast (next 12-24h)</h3>
      <div id="forecastList" class="forecast-list"></div>
    </section>

    <div id="message" class="message"></div>
  </main>

  <script src="script.js"></script>
</body>
</html>
